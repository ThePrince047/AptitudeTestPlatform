<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Gradients -->
  <defs>
    <linearGradient id="primaryGrad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8" /> <!-- Indigo 400 -->
      <stop offset="100%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
    </linearGradient>
    <linearGradient id="accentGrad" x1="17" y1="17" x2="27" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" /> <!-- Sky 400 -->
      <stop offset="100%" stop-color="#0EA5E9" /> <!-- Sky 600 -->
    </linearGradient>
  </defs>
  
  <!-- Graduation Cap Mortarboard (Top) -->
  <path d="M16 4L28 10L16 16L4 10L16 4Z" fill="url(#primaryGrad)" />
  
  <!-- Skullcap (Base) -->
  <path d="M8 12V18C8 21 11.6 22 16 22C20.4 22 24 21 24 18V12" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Tassel -->
  <path d="M23 12.5L24.5 17.5" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" />
  <circle cx="24.5" cy="18.5" r="1" fill="#38BDF8" />
  
  <!-- Success / Test Checkmark Badge (Bottom Right) -->
  <circle cx="22" cy="22" r="5.5" fill="url(#accentGrad)" />
  <path d="M20 22L21.5 23.5L24 21" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
</svg>